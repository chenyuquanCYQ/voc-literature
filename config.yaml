  - "exhaled breath metabolomics VOC biomarker"
  - "human volatile organic compounds disease diagnosis"
  - "breath analysis cancer screening VOC"
  # 液態採集
  - "saliva urine VOC headspace metabolomics"
  - "sweat volatile organic compounds disease"
  # 疾病應用
  - "breath biomarker lung cancer detection"
  - "exhaled VOC diabetes chronic kidney disease"
  - "volatile compounds infection sepsis breath"
  # 亞健康 / 健康監測
  - "breath analysis health monitoring wearable"
  - "VOC subhealth fatigue stress biomarker"
  # 感測器與技術
  - "electronic nose exhaled breath analysis"
  - "SIFT-MS PTR-MS breath analysis clinical"
  - "GC-MS exhaled breath volatile compounds"
  # AI 模型
  - "machine learning breath VOC classification"
  - "deep learning exhaled metabolomics"

# --- 搜尋參數 ---
max_results_per_query: 10     # 每個 query 最多取幾筆
search_source: "scholar"       # scholar / search（Serper 模式）

# --- ClinicalTrials.gov ---
clinical_trials_enabled: true
clinical_trials_queries:
  - "exhaled breath volatile organic compounds"
  - "breath biomarker cancer screening"
