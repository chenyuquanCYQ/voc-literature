ollama_host: "http://localhost:11434"
llm_timeout: 120               # 單篇分類最長等待秒數

# --- 路徑 ---
database_path: "literature.db"
report_dir: "daily_reports"
csv_export_path: "exports/literature_export.csv"

# --- 相關性門檻 ---
# score >= 此值才納入 Dashboard 預設顯示
default_min_score: 2
