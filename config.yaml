# ============================================================
# VOC 文獻自動搜尋系統 — 設定檔 v2
# ============================================================

# --- 聯絡 Email（填任意 email，提升 PubMed / OpenAlex 速率配額，不會寄信）---
contact_email: "dadatiger2022@gmail.com"

# --- 搜尋來源開關 ---
pubmed_enabled:           true    # PubMed（免費主軸，醫學文獻最完整）
openalex_enabled:         true    # OpenAlex（免費主軸，2.5 億篇，覆蓋更廣）
clinical_trials_enabled:  true    # ClinicalTrials.gov（免費）
serper_enabled:           false   # Serper API（選用，預設關閉，改用免費來源）
serper_api_key: "YOUR_SERPER_API_KEY_HERE"

# --- 速率限制（秒）一天兩次、不求快 ---
pubmed_delay:    1.5
openalex_delay:  1.0
ct_delay:        1.0
serper_delay:    1.5

# --- 搜尋關鍵字 ---
search_queries:
  - "exhaled breath metabolomics VOC biomarker"
  - "human volatile organic compounds disease diagnosis"
  - "breath analysis cancer screening VOC"
  - "saliva urine VOC headspace metabolomics"
  - "sweat volatile organic compounds disease"
  - "breath biomarker lung cancer detection"
  - "exhaled VOC diabetes chronic kidney disease"
  - "volatile compounds infection sepsis breath"
  - "breath analysis health monitoring wearable"
  - "VOC subhealth fatigue stress biomarker"
  - "electronic nose exhaled breath analysis"
  - "SIFT-MS PTR-MS breath analysis clinical"
  - "GC-MS exhaled breath volatile compounds"
  - "machine learning breath VOC classification"
  - "deep learning exhaled metabolomics"

# --- 搜尋參數 ---
max_results_per_query: 10

# --- ClinicalTrials 專用查詢 ---
clinical_trials_queries:
  - "exhaled breath volatile organic compounds"
  - "breath biomarker cancer screening"
  - "VOC metabolomics clinical trial"
clinical_trials_max: 10

# --- 排程 ---
schedule_times:
  - "07:00"
  - "19:00"

# --- LLM 設定 ---
ollama_model: "gemma3:12b"
ollama_host: "http://localhost:11434"
llm_timeout: 120

# --- 路徑 ---
database_path: "literature.db"
report_dir: "daily_reports"
csv_export_path: "exports/literature_export.csv"

# --- 相關性門檻 ---
default_min_score: 2# ============================================================
